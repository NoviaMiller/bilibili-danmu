<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 B站弹幕词云分析</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #ffb3d9 0%, #ffd4e5 25%, #ffe5f0 50%, #f5d4ff 75%, #e5c4ff 100%);
    min-height: 100vh;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '✨';
    position: fixed;
    font-size: 2rem;
    animation: float 6s ease-in-out infinite;
    top: 10%;
    left: 10%;
    opacity: 0.6;
  }

  body::after {
    content: '💕';
    position: fixed;
    font-size: 2.5rem;
    animation: float 8s ease-in-out infinite;
    top: 70%;
    right: 15%;
    opacity: 0.5;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  h1 {
    text-align: center;
    font-size: 2.5rem;
    background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #a55eea 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 35px;
    letter-spacing: 3px;
    font-weight: 800;
    text-shadow: 2px 2px 4px rgba(255,182,193,0.3);
    animation: titleGlow 3s ease-in-out infinite;
  }

  @keyframes titleGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255,107,157,0.4)); }
    50% { filter: drop-shadow(0 0 15px rgba(255,107,157,0.6)); }
  }

  .card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(255,105,180,0.2), 0 0 0 1px rgba(255,182,193,0.3);
    padding: 32px 36px;
    margin-bottom: 28px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,192,203,0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(255,105,180,0.3), 0 0 0 1px rgba(255,182,193,0.5);
  }

  .input-row {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 20px;
    border: 3px solid #ffb3d9;
    border-radius: 16px;
    font-size: 1.05rem;
    outline: none;
    transition: all .3s ease;
    background: rgba(255,240,245,0.6);
    color: #d63384;
    font-weight: 500;
  }

  input[type="text"]::placeholder {
    color: #ff9ec4;
  }

  input[type="text"]:focus {
    border-color: #ff69b4;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(255,105,180,0.15);
    transform: scale(1.01);
  }

  button {
    padding: 14px 32px;
    background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 50%, #ffa6c1 100%);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(255,105,180,0.4);
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }

  button:hover::before {
    width: 300px;
    height: 300px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,105,180,0.5);
  }

  button:active {
    transform: translateY(0);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  #status {
    margin-top: 16px;
    font-size: 1rem;
    color: #d63384;
    min-height: 24px;
    font-weight: 500;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 18px;
    margin-bottom: 8px;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px;
    background: linear-gradient(135deg, rgba(255,240,245,0.6) 0%, rgba(255,228,240,0.6) 100%);
    border-radius: 14px;
    border: 2px solid rgba(255,182,193,0.3);
    transition: all 0.3s ease;
  }

  .info-item:hover {
    transform: scale(1.05);
    border-color: #ffb3d9;
    box-shadow: 0 4px 12px rgba(255,105,180,0.2);
  }

  .info-label {
    font-size: 0.85rem;
    color: #ff69b4;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .info-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: #c44569;
  }

  .video-title {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .saved-tip {
    font-size: 0.95rem;
    color: #a55eea;
    margin-top: 14px;
    padding: 10px 16px;
    background: rgba(165,94,234,0.1);
    border-radius: 10px;
    border-left: 4px solid #a55eea;
  }

  #wc-section {
    text-align: center;
  }

  #wc-section h2 {
    color: #ff69b4;
    margin-bottom: 20px;
    font-size: 1.4rem;
    font-weight: 700;
  }

  #wc-img {
    max-width: 100%;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(255,105,180,0.3);
    border: 3px solid rgba(255,182,193,0.5);
    transition: transform 0.3s ease;
  }

  #wc-img:hover {
    transform: scale(1.02);
  }

  .hidden { display: none; }

  .error {
    color: #ff4757;
    margin-top: 12px;
    font-size: 1rem;
    font-weight: 600;
  }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 3px solid #ffb3d9;
    border-top-color: #ff69b4;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .sparkle {
    position: fixed;
    pointer-events: none;
    animation: sparkleFloat 4s ease-in-out infinite;
  }

  @keyframes sparkleFloat {
    0%, 100% {
      transform: translateY(0) scale(1);
      opacity: 0.7;
    }
    50% {
      transform: translateY(-30px) scale(1.2);
      opacity: 1;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌸💖 B站弹幕词云分析 💖🌸</h1>

  <div class="card">
    <div class="input-row">
      <input type="text" id="bvid-input" placeholder="✨ 输入视频 BVID，例如 BV1xx411c79H" />
      <button id="analyze-btn" onclick="analyze()">🎀 开始分析</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="info-card" class="card hidden">
    <div id="video-title" class="video-title"></div>
    <div class="info-grid">
      <div class="info-item"><span class="info-label">👤 UP主</span><span class="info-value" id="i-author"></span></div>
      <div class="info-item"><span class="info-label">👀 播放量</span><span class="info-value" id="i-view"></span></div>
      <div class="info-item"><span class="info-label">💬 弹幕数</span><span class="info-value" id="i-danmaku"></span></div>
      <div class="info-item"><span class="info-label">👍 点赞数</span><span class="info-value" id="i-like"></span></div>
      <div class="info-item"><span class="info-label">🪙 投币数</span><span class="info-value" id="i-coin"></span></div>
      <div class="info-item"><span class="info-label">⭐ 收藏数</span><span class="info-value" id="i-favorite"></span></div>
      <div class="info-item"><span class="info-label">📅 发布时间</span><span class="info-value" id="i-pubdate"></span></div>
    </div>
    <div class="saved-tip" id="i-saved"></div>
  </div>

  <div id="wc-section" class="card hidden">
    <h2>✨ 词云图 ✨</h2>
    <img id="wc-img" src="" alt="词云图" />
  </div>
</div>

<script>
async function analyze() {
  const bvid = document.getElementById('bvid-input').value.trim();
  if (!bvid) { setStatus('💔 请先输入 BVID 哦~', true); return; }

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  setStatus('<span class="spinner"></span>正在获取弹幕并生成词云，请稍候...');
  document.getElementById('info-card').classList.add('hidden');
  document.getElementById('wc-section').classList.add('hidden');

  try {
    const form = new FormData();
    form.append('bvid', bvid);
    const res = await fetch('/analyze', { method: 'POST', body: form });
    const data = await res.json();

    if (!res.ok) { setStatus('❌ ' + (data.error || '请求失败'), true); return; }

    document.getElementById('video-title').textContent = '🎬 ' + data.title;
    document.getElementById('i-author').textContent = data.author;
    document.getElementById('i-view').textContent = fmt(data.view);
    document.getElementById('i-danmaku').textContent = fmt(data.danmaku);
    document.getElementById('i-like').textContent = fmt(data.like);
    document.getElementById('i-coin').textContent = fmt(data.coin);
    document.getElementById('i-favorite').textContent = fmt(data.favorite);
    document.getElementById('i-pubdate').textContent = data.pubdate;
    document.getElementById('i-saved').textContent = `💾 已保存 ${data.saved_count} 条弹幕 → ${data.csv_path}`;

    document.getElementById('wc-img').src = 'data:image/png;base64,' + data.wordcloud;
    document.getElementById('info-card').classList.remove('hidden');
    document.getElementById('wc-section').classList.remove('hidden');
    setStatus('🎉 分析完成！');

    createSparkles();
  } catch (e) {
    setStatus('💥 网络错误：' + e.message, true);
  } finally {
    btn.disabled = false;
  }
}

function fmt(n) { return Number(n).toLocaleString('zh-CN'); }

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = isError ? 'error' : '';
}

function createSparkles() {
  const sparkles = ['✨', '💖', '🌸', '💕', '⭐'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 4000);
    }, i * 200);
  }
}

document.getElementById('bvid-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});
</script>
</body>
</html>
